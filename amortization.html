<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amortization Schedule — To Zero</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script src="precheck.js"></script>
  <script src="simulation.js?v=5"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #faf7f2;
      --surface:    #ffffff;
      --surface2:   #f5f0e8;
      --border:     #e8e0d0;
      --text:       #2d2620;
      --text-muted: #7a6e65;
      --green:      #5a8a6a;
      --green-light:#e8f2eb;
      --amber:      #c4824a;
      --amber-light:#fdf0e6;
      --blue:       #4a7a9b;
      --blue-light: #e6f0f8;
      --avalanche:  #c4824a;
      --snowball:   #4a7a9b;
      --radius:     14px;
      --radius-sm:  8px;
      --shadow-sm:  0 1px 6px rgba(45,38,32,0.06);
      --transition: 0.2s ease;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-link {
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted); text-decoration: none;
      display: flex; align-items: center; gap: 5px;
      transition: color var(--transition); white-space: nowrap;
    }
    .back-link:hover { color: var(--text); }
    .header-title {
      font-size: 1rem; font-weight: 700; letter-spacing: -0.01em;
      flex: 1;
    }
    .header-title span { color: var(--text-muted); font-weight: 400; }

    /* ── Strategy toggle ── */
    .tabs-wrap {
      display: flex; border-radius: var(--radius-sm);
      overflow: hidden; border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      padding: 7px 16px; border: none; background: var(--surface2);
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      color: var(--text-muted); transition: all var(--transition);
      white-space: nowrap;
    }
    .tab-btn:first-child { border-right: 1px solid var(--border); }
    .tab-btn.tab-av { background: var(--amber-light); color: var(--amber); }
    .tab-btn.tab-sb { background: var(--blue-light);  color: var(--blue); }
    /* ── Content ── */
    .content {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    /* ── Summary cards ── */
    .summary-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; margin-bottom: 28px;
    }
    .summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
      box-shadow: var(--shadow-sm);
    }
    .s-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
    .s-value { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; margin-top: 4px; }
    .s-sub   { font-size: 0.73rem; color: var(--text-muted); margin-top: 3px; }
    .c-green { color: var(--green); }
    .c-amber { color: var(--amber); }

    /* ── Cards ── */
    .sched-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-sm);
      margin-bottom: 20px; overflow: hidden;
    }
    .sched-card-header {
      padding: 16px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sched-card-title {
      font-size: 0.875rem; font-weight: 700;
    }
    .sched-card-sub {
      font-size: 0.75rem; color: var(--text-muted); margin-top: 2px;
    }

    /* ── Per-debt accordion ── */
    details { margin-bottom: 12px; }
    details.sched-card { margin-bottom: 12px; }
    summary {
      padding: 16px 20px;
      cursor: pointer;
      list-style: none;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    summary::-webkit-details-marker { display: none; }
    summary .sum-left { display: flex; flex-direction: column; gap: 2px; }
    summary .sum-title { font-size: 0.875rem; font-weight: 700; }
    summary .sum-sub   { font-size: 0.73rem; color: var(--text-muted); }
    summary .sum-right { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
    .chevron {
      width: 16px; height: 16px; flex-shrink: 0;
      transition: transform var(--transition);
      color: var(--text-muted);
    }
    details[open] .chevron { transform: rotate(180deg); }
    details[open] summary { border-bottom: 1px solid var(--border); }

    /* ── Table ── */
    .table-scroll { overflow-x: auto; max-height: 460px; overflow-y: auto; }
    table {
      width: 100%; border-collapse: collapse;
      font-size: 0.8rem;
    }
    thead th {
      padding: 9px 12px;
      text-align: left;
      font-size: 0.67rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted);
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      position: sticky; top: 0; z-index: 1;
    }
    thead th.num { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td {
      padding: 8px 12px;
      white-space: nowrap;
    }
    tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
    tbody td.mo  { color: var(--text-muted); font-size: 0.74rem; width: 44px; }
    tbody td.date { color: var(--text-muted); font-size: 0.74rem; }
    tbody td.bal  { font-weight: 700; }
    tbody td.int  { color: var(--amber); }
    tbody td.pri  { color: var(--green); }
    tbody td.cum  { color: var(--text-muted); font-size: 0.74rem; }
    /* Totals summary bar below table */
    .totals-bar {
      display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
      padding: 12px 16px;
      border-top: 2px solid var(--border);
      background: var(--surface2);
      font-size: 0.8rem;
    }
    .totals-bar .t-item { display: flex; align-items: baseline; gap: 6px; }
    .totals-bar .t-label { color: var(--text-muted); }
    .totals-bar .t-val   { font-weight: 700; font-variant-numeric: tabular-nums; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 80px 24px;
      color: var(--text-muted);
    }
    /* Loading with a saved plan in the URL — hide empty state before JS swaps to content */
    html.has-data #emptyState { display: none; }
    .empty-state h2 { font-size: 1.1rem; color: var(--text); margin-bottom: 8px; }
    .empty-state p  { font-size: 0.875rem; margin-bottom: 20px; }
    .btn-back {
      display: inline-block; padding: 10px 22px;
      background: var(--green); color: white;
      border-radius: 99px; text-decoration: none;
      font-size: 0.875rem; font-weight: 600;
    }

    @media (max-width: 600px) {
      header { padding: 14px 16px; flex-wrap: wrap; gap: 10px; }
      .header-title { font-size: 0.95rem; }
      .header-title span { display: none; }
      .content { padding: 16px 16px 48px; }
      .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .sched-card { padding: 14px; }
      thead th, tbody td { padding: 7px 8px; font-size: 0.78rem; }
      tbody td.mo, tbody td.date, tbody td.cum { font-size: 0.7rem; }
      .totals-bar { gap: 12px; padding: 10px 12px; font-size: 0.74rem; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="back-link" id="backLink" onclick="if(history.length>1){history.back();return false;}">← Calculator</a>
  <div class="header-title">Amortization Schedule <span>— To Zero</span></div>
  <div class="tabs-wrap" id="tabsWrap">
    <button class="tab-btn tab-av" id="tabAv">Avalanche</button>
    <button class="tab-btn" id="tabSb">Snowball</button>
  </div>
</header>

<div id="emptyState" class="empty-state">
  <h2>No debt data found</h2>
  <p>Go back to the calculator, enter your debts, then click "View full amortization schedule."</p>
  <a href="/" class="btn-back">← Back to calculator</a>
</div>

<div class="content" id="content" style="display:none">

  <!-- Summary -->
  <div class="summary-grid" id="summaryArea"></div>

  <!-- Overall schedule -->
  <div class="sched-card">
    <div class="sched-card-header">
      <div class="sched-card-title">Overall schedule</div>
      <div class="sched-card-sub" id="overallSub"></div>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Mo.</th>
            <th>Date</th>
            <th class="num">Balance</th>
            <th class="num">Payment</th>
            <th class="num">Principal</th>
            <th class="num">Interest</th>
            <th class="num">Cum. Interest</th>
          </tr>
        </thead>
        <tbody id="overallBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Per-debt sections -->
  <div id="debtSections"></div>

</div>

<script src="amortization.js?v=2"></script>
</body>
</html>
